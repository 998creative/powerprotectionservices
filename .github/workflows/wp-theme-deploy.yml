name: Deploy PPS Theme

on:
  push:
    branches:
      - main
    paths:
      - "wordpress-theme/power-protection-services/**"
      - ".github/workflows/wp-theme-deploy.yml"
  workflow_dispatch:

concurrency:
  group: pps-theme-deploy-live
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      THEME_DIR: wordpress-theme/power-protection-services
      WP_THEME_SLUG: ${{ vars.WP_THEME_SLUG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build theme zip
        run: |
          test -d "$THEME_DIR"
          cd wordpress-theme
          zip -r theme.zip power-protection-services -x '*.DS_Store'

      - name: Deploy to WordPress
        env:
          WP_DEPLOY_URL: ${{ secrets.WP_DEPLOY_URL }}
          WP_DEPLOY_TOKEN: ${{ secrets.WP_DEPLOY_TOKEN }}
        run: |
          test -n "$WP_DEPLOY_URL"
          test -n "$WP_DEPLOY_TOKEN"
          THEME_SLUG="${WP_THEME_SLUG:-power-protection-services}"

          curl --fail --show-error --silent \
            -X POST "$WP_DEPLOY_URL" \
            -H "x-wp-deploy-token: $WP_DEPLOY_TOKEN" \
            -F "theme_slug=${THEME_SLUG}" \
            -F "commit_sha=${GITHUB_SHA}" \
            -F "theme_zip=@wordpress-theme/theme.zip;type=application/zip"
